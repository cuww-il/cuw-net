<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaNode — Прошивки, Прокси и Джейлбрейк</title>
    <style>
        /* Чистые светлые стили сайта */
        body {
            background-color: #F8FAFC; /* Приятный белый фон */
            color: #334155; /* Темно-серый текст для глаз */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Светлая шапка сайта */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #FFFFFF; /* Белоснежная шапка */
            border-bottom: 1px solid #E2E8F0; /* Тонкая серая линия */
        }

        .logo-box {
            display: flex;
            align-items: center;
        }

        .logo-box svg {
            height: 45px; /* Размер логотипа */
            display: block;
        }

        nav a {
            color: #64748B;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0F172A; /* Черный цвет при наведении */
        }

        /* Главный блок приветствия */
        .main-hero {
            text-align: center;
            padding: 120px 20px;
        }

        .main-hero h1 {
            font-size: 3rem;
            color: #0F172A; /* Глубокий черный заголовок */
            margin-bottom: 15px;
        }

        .main-hero p {
            font-size: 1.2rem;
            color: #64748B;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <!-- Перекрашенный в черный цвет векторный логотип-чертеж -->
        <div class="logo-box">
            <svg viewBox="0 0 500 120">
              <g transform="translate(10, 10)">
                <!-- Серые линии разметки -->
                <circle cx="50" cy="50" r="48" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3" /> 
                <line x1="50" y1="2" x2="50" y2="98" stroke="#94A3B8" stroke-width="1" stroke-dasharray="8 4" />
                <line x1="2" y1="50" x2="98" y2="50" stroke="#94A3B8" stroke-width="1" stroke-dasharray="8 4" />
                <!-- Жирный черный шестиугольник -->
                <polygon points="50,4 90,27 90,73 50,96 10,73 10,27" fill="none" stroke="#0F172A" stroke-width="5" stroke-linejoin="round" />
                <!-- Центральная точка -->
                <circle cx="50" cy="50" r="5" fill="#0F172A" />
              </g>
              <!-- Черный текст названия -->
              <text x="130" y="65" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="#0F172A">NexaNode</text>
            </svg>
        </div>

        <!-- Навигация -->
        <nav>
            <a href="#proxy">Прокси</a>
            <a href="#cydia">iOS & Cydia</a>
            <a href="#firmware">Прошивки</a>
        </nav>
    </header>

    <main class="main-hero">
        <h1>Добро пожаловать в NexaNode</h1>
        <p>Портал о прошивках, обходе ограничений, прокси-серверах и кастомизации iOS и Android гаджетов.</p>
    </main>

</body>
</html>
