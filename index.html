<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaNode — Прошивки, Прокси и Джейлбрейк</title>
    <style>
        /* Стильное хакерское оформление сайта */
        body {
            background-color: #0B0F19; /* Глубокий темный фон */
            color: #E2E8F0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Шапка сайта с логотипом */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #0F172A;
            border-bottom: 1px solid #1E293B;
        }

        .logo-box {
            display: flex;
            align-items: center;
        }

        .logo-box img {
            height: 45px; /* Идеальный размер для твоего логотипа */
            display: block;
        }

        nav a {
            color: #94A3B8;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #FFFFFF; /* Белый цвет при наведении */
        }

        /* Главный блок приветствия */
        .main-hero {
            text-align: center;
            padding: 120px 20px;
        }

        .main-hero h1 {
            font-size: 3rem;
            color: #FFFFFF;
            margin-bottom: 15px;
        }

        .main-hero p {
            font-size: 1.2rem;
            color: #94A3B8;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <!-- Твой собственный логотип с GitHub -->
        <div class="logo-box">
            <img src="logo.svg" alt="NexaNode Logo">
        </div>

        <!-- Навигация по разделам -->
        <nav>
            <a href="#proxy">Прокси</a>
            <a href="#cydia">iOS & Cydia</a>
            <a href="#firmware">Прошивки</a>
        </nav>
    </header>

    <main class="main-hero">
        <h1>Добро пожаловать в NexaNode</h1>
        <p>Портал о прошивках, обходе ограничений, прокси-серверах и кастомизации iOS и Android гаджетов.</p>
    </main>

</body>
</html>
